<!DOCTYPE html>
<html>
<head>
    <title>AirChat</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #111;
            color: white;
        }

        #messages {
            height: 85vh;
            overflow-y: auto;
            padding: 10px;
        }

        #bottomBar {
            display: flex;
            padding: 10px;
            background: #222;
        }

        #messageInput {
            flex: 1;
            padding: 8px;
            border: none;
            outline: none;
        }

        button {
            margin-left: 5px;
            padding: 8px 10px;
            border: none;
            cursor: pointer;
        }

        img, video {
            margin-top: 5px;
            border-radius: 6px;
        }
    </style>
</head>
<body>

<div id="messages"></div>

<div id="bottomBar">
    <input id="messageInput" placeholder="Type message..." autocomplete="off" />
    <button onclick="pickFile()">📎</button>
    <button onclick="send()">Send</button>
    <button onclick="logout()">Logout</button>
    <input type="file" id="fileInput" style="display:none">
</div>

<script>
const socket = io();
const messagesDiv = document.getElementById("messages");
const messageInput = document.getElementById("messageInput");
const fileInput = document.getElementById("fileInput");

let typingDiv = document.createElement("div");
typingDiv.style.fontStyle = "italic";
typingDiv.style.color = "gray";
typingDiv.style.display = "none";
messagesDiv.appendChild(typingDiv);

let typingTimeout;

// =======================
// CHECK LOGIN
// =======================

fetch("/me")
.then(res => {
    if (!res.ok) {
        window.location.href = "/login.html";
    }
});

// =======================
// TYPING
// =======================

messageInput.addEventListener("input", () => {
    socket.emit("typing");

    clearTimeout(typingTimeout);
    typingTimeout = setTimeout(() => {
        socket.emit("stopTyping");
    }, 1000);
});

// =======================
// SOCKET EVENTS
// =======================

socket.on("loadMessages", (msgs) => {
    messagesDiv.innerHTML = "";
    messagesDiv.appendChild(typingDiv);
    msgs.forEach(addMessage);
});

socket.on("chatMessage", (data) => {
    addMessage(data);
});

socket.on("typing", (username) => {
    typingDiv.textContent = username + " is typing...";
    typingDiv.style.display = "block";
    scrollToBottom();
});

socket.on("stopTyping", () => {
    typingDiv.style.display = "none";
});

// =======================
// SEND MESSAGE
// =======================

function send() {

    const message = messageInput.value.trim();

    if (!message && !fileInput.files[0]) return;

    if (fileInput.files[0]) {

        const formData = new FormData();
        formData.append("file", fileInput.files[0]);

        fetch("/upload", {
            method: "POST",
            body: formData
        })
        .then(res => res.json())
        .then(data => {

            socket.emit("chatMessage", {
                message,
                file: data.file
            });

            messageInput.value = "";
            fileInput.value = "";
            socket.emit("stopTyping");
        });

    } else {

        socket.emit("chatMessage", { message });

        messageInput.value = "";
        socket.emit("stopTyping");
    }
}

// =======================
// ADD MESSAGE
// =======================

function addMessage(data) {

    const div = document.createElement("div");

    div.innerHTML = `<strong>${data.username}:</strong><br>`;

    if (data.file) {

        const fileUrl = "uploads/" + data.file;
        const ext = data.file.split(".").pop().toLowerCase();

        let media;

        if (["mp4", "webm", "mov"].includes(ext)) {
            media = document.createElement("video");
            media.controls = true;
            media.width = 200;
        }
        else if (["mp3", "wav", "ogg"].includes(ext)) {
            media = document.createElement("audio");
            media.controls = true;
        }
        else {
            media = document.createElement("img");
            media.width = 140;
        }

        media.src = fileUrl;
        div.appendChild(media);
    }

    if (data.message) {
        const text = document.createElement("div");
        text.innerText = data.message;
        div.appendChild(text);
    }

    messagesDiv.insertBefore(div, typingDiv);
    scrollToBottom();
}

// =======================
// HELPERS
// =======================

function pickFile() {
    fileInput.click();
}

function scrollToBottom() {
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

function logout() {
    fetch("/logout", { method: "POST" })
    .then(() => {
        window.location.href = "/login.html";
    });
}
</script>

</body>
</html>
